name: Laravel CI with SonarCloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Wajib untuk SonarCloud

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo, pdo_mysql, pdo_sqlite, xml, xdebug
          coverage: xdebug

      # 3. Cache Composer
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      # 4. Install dependencies
      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      # 5. Setup environment
      - name: Copy .env
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      # 6. Jalankan tests dengan coverage (SQLite in-memory via phpunit.xml)
      - name: Run PHPUnit tests with coverage
        run: |
          XDEBUG_MODE=coverage ./vendor/bin/phpunit \
            --coverage-clover=coverage.xml
      
      # 7. Verifikasi coverage.xml terbuat
      - name: Verify coverage report exists
        run: |
          if [ ! -f coverage.xml ]; then
            echo "coverage.xml not found!"
            exit 1
          fi
          echo "Coverage file size: $(wc -c < coverage.xml) bytes"
          head -5 coverage.xml

      # 8. SonarCloud Scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}