name: Laravel CI with SonarCloud

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring,bcmath,pdo,pdo_mysql,xml,xdebug
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Configure database
        run: |
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=laravel_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=root" >> .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests with coverage
        run: php artisan test --coverage-clover=coverage.xml --log-junit=test-results.xml
        env:
          XDEBUG_MODE: coverage

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: 'Laravel Test Results'
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            test-results.xml
            coverage.xml
          retention-days: 14

      - name: Comment Coverage Summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'coverage.xml';

            if (!fs.existsSync(path)) {
              console.log('coverage.xml not found, skipping comment.');
              return;
            }

            const xml = fs.readFileSync(path, 'utf8');

            // Parse nilai line-rate dari tag <coverage>
            const match = xml.match(/line-rate="([0-9.]+)"/);
            const lineRate = match ? (parseFloat(match[1]) * 100).toFixed(2) : 'N/A';

            // Tentukan emoji berdasarkan threshold
            const pct = parseFloat(lineRate);
            const icon = pct >= 80 ? '🟢' : pct >= 60 ? '🟡' : '🔴';

            // Hitung total tests dari JUnit XML
            let totalTests = 'N/A', failures = 'N/A', errors = 'N/A';
            const junitPath = 'test-results.xml';
            if (fs.existsSync(junitPath)) {
              const junit = fs.readFileSync(junitPath, 'utf8');
              const testsMatch  = junit.match(/tests="(\d+)"/);
              const failMatch   = junit.match(/failures="(\d+)"/);
              const errorMatch  = junit.match(/errors="(\d+)"/);
              totalTests = testsMatch  ? testsMatch[1]  : 'N/A';
              failures   = failMatch   ? failMatch[1]   : '0';
              errors     = errorMatch  ? errorMatch[1]  : '0';
            }

            const body = [
              '## 🧪 Test Report Summary',
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| ${icon} Line Coverage | **${lineRate}%** |`,
              `| ✅ Total Tests | **${totalTests}** |`,
              `| ❌ Failures | **${failures}** |`,
              `| 💥 Errors | **${errors}** |`,
              '',
              `> Full report tersedia di tab **[Actions → Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})**`,
            ].join('\n');

            // Cari komentar lama dari bot, update kalau ada (hindari duplikat)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🧪 Test Report Summary')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }


      - name: Verify Sonar token
        if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is missing"
            exit 1
          else
            echo "SONAR_TOKEN found"
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Scan
        if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}