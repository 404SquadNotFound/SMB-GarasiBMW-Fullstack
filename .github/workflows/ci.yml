name: Laravel CI with SonarCloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo, pdo_mysql, pdo_sqlite, xml, xdebug
          coverage: xdebug

      # 3. Install deps
      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      # 4. Env setup
      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # 5. Prepare folder
      - name: Prepare build folder
        run: mkdir -p build

      # 6. Run PHPUnit + coverage
      - name: Run PHPUnit tests with coverage
        run: php vendor/bin/phpunit --coverage-clover=build/coverage.xml

      # 7. Debug 
      - name: Debug coverage file
        run: |
          pwd
          ls -la
          ls -la build

      # 8. SonarCloud Scan 
      - name: SonarCloud Scan
        run: |
          sonar-scanner \
            -Dsonar.projectKey=404SquadNotFound_SMB-GarasiBMW-Fullstack \
            -Dsonar.organization=404squadnotfound \
            -Dsonar.sources=app,database,routes,config \
            -Dsonar.tests=tests \
            -Dsonar.php.coverage.reportPaths=build/coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}